<!DOCTYPE html>
<html lang="es">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<link href='http://fonts.googleapis.com/css?family=Roboto' rel='stylesheet' type='text/css'>
		<title>Contacto Jayor</title>
		<!-- use the font -->
	    <style>
	        body {
	            font-family: 'Roboto', sans-serif;
	            font-size: 12px;
	        }
	    </style>
	</head>
	<body style="margin: 0; padding: 0;">
		<table style="border: 0; width: 600px; padding: 0; border-collapse: collapse;">
			<thead></thead>
			<tbody>
				<tr style="margin-top: 10px; margin-bottom: 30px;">
					<td>
						<span><b>¡Contacto Jayor!</b></span>
					</td>
				</tr>
				<tr style="margin-top: 10px;">
					<td style="background-color: #eaeaea; padding: 10px 30px 20px;">
						<p><b><span style="text-decoration: underline;">Información de contacto</span></b></p>
						<ul>
							<li>
								<span><b>Nombre: </b><span>{{name}}</span></span>
							</li>							
							<li>
								<span><b>E-mail: </b><span>{{email}}</span></span>
							</li>
							<li>
								<span><b>Asunto: </b><span>{{subject}}</span></span>
							</li>
							<li>
								<span><b>Comentarios: </b><br /><span>{{comments}}</span></span>
							</li>							
						</ul>
					</td>
				</tr>
			</tbody>
			<tfoot style="font-size: 10px;"></tfoot>
		</table>
	</body>
</html>
